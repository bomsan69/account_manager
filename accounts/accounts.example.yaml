# Account Manager - 계정 정보 예시 파일
# cp accounts/accounts.example.yaml accounts/accounts.yaml
#
# auth_method 종류:
#   password - 이메일/아이디 + 비밀번호 (전통적 로그인)
#   oauth    - 소셜 로그인 (Google, GitHub, Kakao 등), 비밀번호 없음
#   apikey   - API 키 인증
#   passkey  - 패스키/WebAuthn, 비밀번호 없음

이메일:
  example_gmail:
    site: Gmail
    url: https://gmail.com
    auth_method: password
    이메일: user@example.com
    비밀번호: <YOUR_PASSWORD_HERE>
    메모: 복구 이메일 - backup@example.com / 2FA 활성화
    updated: '2026-01-01'

SNS:
  example_notion_oauth:
    site: Notion
    url: https://notion.so
    auth_method: oauth
    oauth_provider: Google
    oauth_account: user@example.com
    메모: Google 계정으로 로그인
    updated: '2026-01-01'

  example_github_oauth:
    site: GitHub
    url: https://github.com
    auth_method: oauth
    oauth_provider: Google
    oauth_account: user@example.com
    아이디: myusername
    메모: Google OAuth + 2FA 활성화
    updated: '2026-01-01'

API:
  example_openai:
    site: OpenAI
    url: https://platform.openai.com
    auth_method: apikey
    이메일: user@example.com
    api_key: <YOUR_API_KEY_HERE>
    메모: GPT-4 사용, 월 $20 플랜
    updated: '2026-01-01'

호스팅:
  example_hosting:
    site: ExampleHosting
    url: https://example-hosting.com
    auth_method: password
    이메일: admin@example.com
    비밀번호: <YOUR_PASSWORD_HERE>
    updated: '2026-01-01'
